
<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Expedition-Go Tours LTD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="logo">
            <h1>Expedition-Go Tours LTD</h1>
            <p>Your adventure starts here</p>
        </div>
        <nav>
            <ul>
                <li><a href="www.expeditiongotours.com">Home</a></li>
                <li><a href="#booking">Book Now</a></li>
        
            </ul>
        </nav>
    </header>

    <main>
        <section id="tours" class="section tours" aria-label="Available tour packages">
            <h2>Popular Tours</h2>
            <div id="tourCards" class="grid"></div>
        </section>

        <section id="booking" class="section booking" aria-label="Booking form">
            <h2>Book a Tour</h2>
            <form id="bookingForm" autocomplete="off">
                <div class="form-grid">
                    <label for="tourSelect">Select Tour <span class="required">*</span></label>
                    <select id="tourSelect" name="tour" required></select>

                    <label for="startDate">Start Date <span class="required">*</span></label>
                    <input type="date" id="startDate" name="startDate" required min="2026-03-25">

                    <label for="guests">Guests <span class="required">*</span></label>
                    <input type="number" id="guests" name="guests" required value="1" min="1" max="20">

                    <label for="name">Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="Name" required>

                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>

                    <label for="phone">Phone <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" placeholder="1234567890" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Reserve Now</button>
                    <button type="button" id="clearBtn" class="btn btn-secondary">Clear</button>
                </div>
            </form>
        </section>

        <section id="confirmation" class="section confirmation" aria-live="polite">
            <h2>Latest Booking</h2>
            <div id="bookingSummary" class="card">No booking yet. Fill out the form above.</div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Expedition-Go Tours LTD. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
